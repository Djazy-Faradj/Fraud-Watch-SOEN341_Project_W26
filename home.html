<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Material Design</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *,
        *:after,
        *::before {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
                url('https://images.pexels.com/photos/1640770/pexels-photo-1640770.jpeg');
            background-position: center;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .materialContainer {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            color: #333;
        }

        h1 {
            color: #ED2553;
            margin-bottom: 20px;
            font-weight: 900;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-logout {
            display: inline-block;
            padding: 12px 30px;
            background: #ED2553;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            text-transform: uppercase;
        }

        .btn-logout:hover {
            background: #c21d42;
        }
    </style>
</head>

<body>

    <div class="materialContainer">
        <h1>Welcome Home!</h1>
        <p id="welcome-msg">You have successfully logged in.</p>
        <button id="logout-btn" class="btn-logout">Logout</button>
    </div>

    <script src="supabase-init.js"></script>
    <script>
        // Check if user is logged in
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();

            if (!session) {
                // If not logged in redirect to login
                window.location.href = 'login.html';
            } else {
                console.log('User:', session.user);
                const email = session.user.email;
                document.getElementById('welcome-msg').textContent = `You are logged in as ${email}`;
            }
        }

        checkSession();

        // Logout logic
        document.getElementById('logout-btn').addEventListener('click', async () => {
            const { error } = await supabase.auth.signOut();
            if (!error) {
                window.location.href = 'login.html';
            } else {
                alert('Error logging out: ' + error.message);
            }
        });
    </script>
</body>

</html>
